- title: インテリア
  id: interior
  summary: |
    インテリアデザインは、ソファやテーブルといった家具だけでなく、屋内空間全体の演出を考える分野です。くつろぎやすいリビング、清潔感のあるキッチンなど、求められる雰囲気はその場所によって異なります。機能や文化、なによりもそこに住む「人」を中心に色彩を考えていきます。
  sections:
