- title: 色の作り方と色再現
  id: color-creation-and-reproduction
  summary: |
    色を重ねたり混ぜたりすると新たな色が現れる、混色について学びます。色のついた光を重ねるのか、色のついた物（フィルタなど）を重ねるのかによって、現れる色は異なってきます。
    混色の考え方は、コンピュータ等での色の指定にも用いられます。コンピュータで作った色を印刷したらどうなるか？についても考えてみましょう。
