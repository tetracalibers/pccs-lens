- title: 配色と色彩調和
  id: color-scheme-and-harmony
  summary: |
    PCCSのトーンの仕組みは、明度や彩度の関係をシンプルに捉え、イメージに合う色選びを助けてくれるものです。使いたい色をPCCSに落とし込んでから色の組み合わせ（配色）を考えることで、配色の技法を直感的に理解できます。

    また、配色技法の背景には、なぜその組み合わせが調和するのか？という数々の研究があります。
