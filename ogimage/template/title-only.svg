<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">

  <defs>

    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e03131"></stop><stop offset="9.09%" stop-color="#f76707"></stop>
      <stop offset="18.18%" stop-color="#f59f00"></stop><stop offset="27.27%" stop-color="#94d82d"></stop>
      <stop offset="36.36%" stop-color="#2f9e44"></stop><stop offset="45.45%" stop-color="#0c8599"></stop>
      <stop offset="54.54%" stop-color="#1971c2"></stop><stop offset="63.63%" stop-color="#3b5bdb"></stop>
      <stop offset="72.72%" stop-color="#6741d9"></stop><stop offset="81.81%" stop-color="#9c36b5"></stop>
      <stop offset="90.90%" stop-color="#c2255c"></stop><stop offset="100%" stop-color="#e84393"></stop>
    </linearGradient>
    <!-- #prism: SiteHeader の .site-name-lens と統一（同一の6色ストップ）。
         x1/x2 は monospace の "Color "(6)/"Prism"(5) 比で、"Prism" 部分に background-size:200% 相当
         （グラデ前半＝赤→黄→緑）を効かせるための値。 -->
    <linearGradient id="prism" x1="0.545" y1="0" x2="1.455" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"></stop><stop offset="20%" stop-color="#ffd93d"></stop>
      <stop offset="40%" stop-color="#6bcb77"></stop><stop offset="60%" stop-color="#4d96ff"></stop>
      <stop offset="80%" stop-color="#c77dff"></stop><stop offset="100%" stop-color="#ff6b6b"></stop>
    </linearGradient>
    <filter id="blur" filterUnits="userSpaceOnUse" x="0" y="0" width="1200" height="630"><feGaussianBlur stdDeviation="55"></feGaussianBlur></filter>
    <clipPath id="frame"><rect width="1200" height="630"></rect></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="630" fill="#ffffff"></rect>
    <g filter="url(#blur)">
      <circle cx="160" cy="510" r="260" fill="#ff6b6b" opacity="0.22"></circle>
      <circle cx="1040" cy="80" r="240" fill="#4d96ff" opacity="0.22"></circle>
      <circle cx="630" cy="90" r="210" fill="#c77dff" opacity="0.20"></circle>
      <circle cx="756" cy="550" r="180" fill="#6bcb77" opacity="0.16"></circle>
    </g>
    <rect width="1200" height="10" fill="url(#rainbow)"></rect>

    <!--TITLE-->

    <g>
      <circle cx="540" cy="378" r="8" fill="#ff6b6b"></circle><circle cx="570" cy="378" r="8" fill="#ffd93d"></circle>
      <circle cx="600" cy="378" r="8" fill="#6bcb77"></circle><circle cx="630" cy="378" r="8" fill="#4d96ff"></circle>
      <circle cx="660" cy="378" r="8" fill="#c77dff"></circle>
    </g>

    <text font-family="SUSE Mono" x="600" y="470" text-anchor="middle" font-size="45" font-weight="500" letter-spacing="-1" fill="#1a1a1a">Color <tspan fill="url(#prism)">Prism</tspan></text>
  </g>
</svg>
